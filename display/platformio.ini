[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    ; Конфіг дисплея заданий тут, User_Setup.h бібліотеки не читаємо.
    -D USER_SETUP_LOADED=1

    ; Драйвер і розмір матриці (портретний — "рідний" для драйвера).
    -D ILI9341_2_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320

    ; До яких ніжок ESP32 припаяний дисплей на платі CYD.
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1

    ; Підсвітка.
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH

    ; Шрифт, яким малюємо (номер 4 у drawString).
    -D LOAD_FONT4=1
